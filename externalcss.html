<!doctype html>
<html lang="tr">
<head>

<body>

        <td class="alt2">Kimya</td>

      <tr>
        <td class="time-col">10:15 - 11:15</td>
        <td class="alt2">Geometri</td>
        <td class="alt1">Laboratuvar</td>
        <td class="alt2">Algoritma</td>
        <td class="alt1">İngilizce</td>
        <td class="alt2">Beden Eğitimi</td>
      </tr>
    </tbody>

</html>
