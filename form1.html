<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Üyelik Formu</title>
</head>
<body>

    <h2>Üyelik Formu</h2>

    <form>
        <label for="isim">İsim:</label><br>
        <input type="text" id="isim" name="isim" placeholder="Adınız" required><br><br>

        <label for="soyisim">Soyisim:</label><br>
        <input type="text" id="soyisim" name="soyisim" placeholder="Soyadınız" required><br><br>

        <label for="email">E-posta:</label><br>
        <input type="email" id="email" name="email" placeholder="E-posta adresiniz" required><br><br>

        <label for="sifre">Şifre:</label><br>
        <input type="password" id="sifre" name="sifre" placeholder="Şifreniz" required><br><br>

        <label>Cinsiyet:</label><br>
        <input type="radio" id="kadin" name="cinsiyet" value="kadin" required>
        <label for="kadin">Kadın</label><br>
        <input type="radio" id="erkek" name="cinsiyet" value="erkek">
        <label for="erkek">Erkek</label><br><br>

        <label for="dogum">Doğum Tarihi:</label><br>
        <input type="date" id="dogum" name="dogum" required><br><br>

        <label for="telefon">Telefon:</label><br>
        <input type="tel" id="telefon" name="telefon" placeholder="05XX XXX XX XX"><br><br>

        <input type="submit" value="Üyeliği Oluştur">
        <input type="reset" value="Temizle">
    </form>

</body>
</html>
