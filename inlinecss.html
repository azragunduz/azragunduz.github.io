      </tr>
    </thead>
    <tbody>

        <td style="border:1px solid #aaa; padding:8px; text-align:center; font-weight:bold;">09:00 - 10:00</td>

        <td style="border:1px solid #aaa; padding:8px; background:#ecf0f1;">Laboratuvar</td>
        <td style="border:1px solid #aaa; padding:8px; background:#f9e79f;">Algoritma</td>
        <td style="border:1px solid #aaa; padding:8px; background:#ecf0f1;">İngilizce</td>
        <td style="border:1px solid #aaa; padding:8px; background:#f9e79f;">Beden Eğitimi</td>
      </tr>
    </tbody>

</html>
