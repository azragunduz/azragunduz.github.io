  <style>
    /* 🎨 Arka plan ve genel stil */
    body {
      background-color: #e8f3ef; /* açık su yeşili, nude ton */
      font-family: 'Poppins', sans-serif;
      color: #3e4c45; /* yumuşak gri-yeşil yazı */
      margin: 0;
      padding: 0;
    }

    /* 🩵 Başlık */
    h1 {
      text-align: center;
      margin-top: 40px;
      color: #2f4f4f;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* 🗂️ Haftalar başlıkları */

      margin-left: 20px;
      color: #40675a;
      border-left: 4px solid #a7c7b5;
      padding-left: 10px;
      font-weight: 500;
    }

    /* 🌿 Menü (görev listesi) */
    nav ul {
      list-style-type: disc; /* noktalar */
      padding-left: 40px;
    }

    nav ul li {
      margin: 6px 0;
    }

    nav ul li a {
      text-decoration: none;
      color: #2f4f4f;
      background-color: #f4f8f6;
      padding: 8px 14px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    /* 💫 Hover efekti */
    nav ul li a:hover {
      background-color: #cde4da;
      color: #264e3e;
      transform: scale(1.03);
    }

    /* 🩰 Alt kısım */
    footer {
      text-align: center;
      font-size: 0.9em;
      color: #65776f;
      margin-top: 60px;
