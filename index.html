<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azra Betül Gündüz - BTE311 Görevleri</title>

  <style>
    /* Arka plan ve genel stil */
    body {
      background-color: #d8efe6;
      font-family: 'Poppins', sans-serif;
      color: #2f3f36;
      margin: 0;
      padding: 0;
    }

    /* Başlık */
    h1 {
      text-align: center;
      margin-top: 40px;
      color: #244f3b;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Haftalar başlıkları */
    h2 {
      margin-left: 20px;
      color: #40675a;
      border-left: 4px solid #a7c7b5;
      padding-left: 10px;
      font-weight: 500;
    }

    /* Menü (görev listesi) */
    nav ul {
      list-style-type: disc; /* noktalar */
      padding-left: 40px;
    }

    nav ul li {
      margin: 6px 0;
    }

    nav ul li a {
      text-decoration: none;
      color: #2f4f4f;
      background-color: #f2fbf6;
      padding: 8px 14px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    /* Hover efekti */
    nav ul li a:hover {
      background-color: #b7e2c9;
      color: #264e3e;
      transform: scale(1.03);
    }

    /* Alt kısım */
    footer {
      text-align: center;
      font-size: 0.9em;
      color: #65776f;
      margin-top: 60px;
      padding-bottom: 20px;
    }
  </style>
</head>

<body>
  <h1>Azra Betül Gündüz</h1>

  <h2>05.11.2025</h2>
  <nav>
    <ul>
      <li><a href="animasyon.html">Animasyon</a></li>
    </ul>
  </nav>

  <footer>
    © 2025 Azra Betül Gündüz | BTE311 Görevleri
  </footer>
</body>
</html>
