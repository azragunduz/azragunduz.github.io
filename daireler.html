<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>Daireler - 3 div</title>
  <style>
    body { font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; min-height:90vh; background:#f2f3f4; margin:0; }
    .wrap { display:flex; gap:30px; align-items:center; }

    .ball {
      width:160px;
      height:160px;
      border-radius:50%;
      display:inline-block;
      position:relative;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      color:#222;
      font-size:18px;
    }

    
    .ball.one { background: #f6d365; }   /* soft nude / warm */
    .ball.two { background: #f5e1d8; }   /* nude ton */
    .ball.three { background: #efe1ff; } /* nude/pastel */
    
    .ball::before,
    .ball::after {
      content:"";
      position:absolute;
      width:14px;
      height:14px;
      border-radius:50%;
      background:#222;
      top:54px;
    }
    .ball::before { left:48px; }
    .ball::after { right:48px; }
    
    .ball .mouth {
      position:absolute;
      bottom:36px;
      width:56px;
      height:28px;
      border-bottom:4px solid rgba(0,0,0,0.65);
      border-radius:0 0 40px 40px;
      transform-origin:center;
    }
    .ball.one .mouth { border-bottom-color: rgba(0,0,0,0.65); transform:translateY(0) rotate(0deg); } /* normal gülümseme */
    .ball.two::before, .ball.two::after { width:10px; height:10px; top:52px; } /* küçük göz */
    .ball.two .mouth { border-bottom:4px solid rgba(0,0,0,0.65); border-radius:0 0 10px 10px; transform:translateY(2px) rotate(6deg); } /* hafif farklı yüz */
    .ball.three::before, .ball.three::after { top:56px; width:12px; height:12px; background:#4b2e83; } /* renkli göz */
    .ball.three .mouth { width:36px; height:20px; bottom:44px; border-bottom:4px solid rgba(75,46,131,0.9); border-radius:0 0 20px 20px; transform:translateY(0) }

    @media (max-width:500px) {
      .ball { width:110px; height:110px; }
      .ball::before, .ball::after { top:36px; }
      .ball .mouth { bottom:24px; width:40px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="ball one"><div class="mouth"></div></div>
    <div class="ball two"><div class="mouth"></div></div>
    <div class="ball three"><div class="mouth"></div></div>
  </div>
</body>
</html>
